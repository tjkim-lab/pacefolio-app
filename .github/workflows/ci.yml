name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pacefolio
          POSTGRES_PASSWORD: pacefolio
          POSTGRES_DB: pacefolio_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pacefolio"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # 실 PG 동시성 테스트(R5 Phase 4 완료 기준) — 로컬에선 미설정 시 skip
      DATABASE_URL_TEST: postgres://pacefolio:pacefolio@localhost:5432/pacefolio_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Typecheck (전 워크스페이스)
        run: npm run typecheck
      - name: Tests (domain 불변식·db 제약·api 인증/연결 통합·PG 동시성 경쟁·web 시뮬 게이트)
        run: npm test
      - name: OpenAPI lint (R4 — YAML 파서 검증 + Redocly 규칙, drift test 가 못 잡는 문법 오류 차단)
        run: npx --yes @redocly/cli@1.34.2 lint api/openapi.yaml
      - name: Web lint
        run: npm run lint
      - name: Web build
        run: npm run build

  # E 리뷰 §7(#34): 브라우저 E2E — 코치 ACK·PC 공지 발행·admin MRR 을 실 서버 조합으로 검증
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: E2E (API PGlite seed + next dev + chromium)
        run: npm run test:e2e
        working-directory: apps/web
