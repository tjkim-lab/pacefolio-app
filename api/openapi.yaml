openapi: 3.1.0
info:
  title: PACEFOLIO API
  version: 0.2.0-draft
  description: >
    API 계약 (R2 B3b 재작성 · R4 보안 계약 · R7 P0-5 구현 정합). 도메인 모델 = packages/domain, 규칙 = docs/02~09.
    모든 요청은 서버가 (1)역할 능력 canAny() (2)테넌트/소유/담당 스코프(authorization.ts)를 검증.
    클라이언트가 준 role·academyId·participantId·otpVerified 등은 절대 신뢰하지 않는다.
    enum 값은 packages/domain/enums.ts 와 x-domain-enum 마커로 자동 대조된다(test/openapi-drift.test.ts).

    [구현 현황 — 정본 = apps/api/src/app.ts]
    구현된 경로(auth start/callback·dev login·sessions me/logout/logout-all·
    guardian-links·payments/prepare·invoices·webhooks/pg)는 실제 응답 형식·상태코드
    기준으로 기술한다. "(계약 초안 — 미구현)" 표기 경로는 착공 전 계약이며 구현 시
    이 문서를 구현 기준으로 갱신한다. 오류 응답 형식은 components/schemas/Error 참조
    ({ error: "CODE" } — requestId 필드는 추후 공통 오류 계약(P1)에서 추가 예정).

    [CSRF 계약 — R4 §11 · 상세 docs/11-security-contracts.md]
    상태를 변경하는 모든 요청(POST/PUT/PATCH/DELETE — 결제준비·환불요청/승인·
    동의변경·탈퇴·로그아웃·전기기 로그아웃·SupportView 발급/철회)은 다음을 모두 만족:
    (1) 세션 쿠키 SameSite=Lax (2) 서버 Origin 검증(allowlist 불일치 = 403)
    (3) X-CSRF-Token 헤더 = double-submit cookie 검증.
    Admin 은 별도 도메인/앱으로 분리하며 독립 CSRF 방어를 갖는다.

servers:
  - url: https://api.pacefolio.example/v1

security:
  - sessionCookie: []

tags:
  - name: auth
  - name: linking
  - name: classes
  - name: attendance
  - name: billing
  - name: consent
  - name: account
  - name: admin
  - name: webhooks

paths:
  # ── 인증 · 세션 (리뷰 R2 P0-10 최소 계약) ─────────────────────
  /auth/{provider}/start:
    post:
      tags: [auth]
      security: []
      summary: 소셜 로그인 시작 — 카카오(앵커)·네이버·구글·애플
      description: >
        [OAuth 보안 계약 — R4 §12] state 는 서버 저장·일회성 소비·10분 만료.
        PKCE(S256) code_challenge 필수. OIDC provider(구글·애플)는 nonce 포함.
        redirect URI 는 서버 allowlist 로만. authorization code 는 1회 사용 후 폐기.
        계정 병합 금지: 동일 이메일이라도 서로 다른 소셜 계정을 자동 병합하지
        않는다 — 병합은 별도 인증 절차 + 사용자 명시 확인 필요.
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [kakao, naver, google, apple] }
      responses:
        '200': { description: 'authorize URL + state(서버 저장·일회성·만료)', content: { application/json: { schema: { type: object, properties: { authorizeUrl: { type: string }, state: { type: string } } } } } }
        '404': { description: UNKNOWN_PROVIDER — kakao/naver/google/apple 외, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '501': { description: PROVIDER_NOT_CONFIGURED — 키 미설정 provider, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /auth/{provider}/callback:
    get:
      tags: [auth]
      security: []
      summary: OAuth callback — 세션 발급. 신규 사용자는 약관·동의 단계로.
      description: >
        서버 검증 순서: state 존재·미사용·미만료 확인 후 즉시 소비 →
        PKCE code_verifier 대조 → code 교환(1회) → OIDC nonce 대조 →
        provider 의 verified email/phone 만 신뢰. 어느 하나 실패 = 401(로그인 CSRF 방어).
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
        - { name: code, in: query, required: true, schema: { type: string } }
        - { name: state, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: '세션 쿠키 설정(HttpOnly·Secure·SameSite=Lax·rotation). body = { userId, isNewUser } — 세션 정보는 쿠키+GET /sessions/me 로', content: { application/json: { schema: { type: object, required: [userId, isNewUser], properties: { userId: { type: string }, isNewUser: { type: boolean } } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501': { description: PROVIDER_NOT_CONFIGURED, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /auth/dev/login:
    post:
      tags: [auth]
      security: []
      summary: 개발용 로그인 — 카카오 키 없이 세션 발급 (dev 전용, 프로덕션 404)
      description: >
        게이트: enableDevLogin && NODE_ENV !== production — 미충족 시 404 NOT_FOUND
        (존재 자체를 숨김, PG_SIMULATION 과 같은 패턴). 이름 기반 seed 사용자를
        재사용해 결정적 userId 로 세션 쿠키를 발급한다. 실 provider 연동과 무관.
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [name], properties: { name: { type: string, minLength: 1, maxLength: 30 } }, additionalProperties: false } } }
      responses:
        '200': { description: 세션 쿠키 설정 + userId, content: { application/json: { schema: { type: object, required: [userId], properties: { userId: { type: string } } } } } }
        '404': { description: 프로덕션 또는 dev login 비활성 — NOT_FOUND, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '422': { description: INVALID_BODY, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /sessions/me:
    get:
      tags: [auth]
      summary: 현재 세션·소속·역할 — route guard 의 진실. 멤버십은 서버 도출.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /sessions/refresh:
    post:
      tags: [auth]
      summary: 세션 갱신 (계약 초안 — 미구현)
      responses:
        '200': { description: 갱신됨 }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /sessions/logout:
    post:
      tags: [auth]
      summary: 로그아웃(현재 기기)
      responses: { '204': { description: 세션 폐기 } }
  /sessions/logout-all:
    post:
      tags: [auth]
      summary: 모든 기기 로그아웃 — 멤버십 ENDED·탈퇴 시에도 서버가 강제 호출
      responses: { '204': { description: 전체 세션 폐기 } }

  # ── 보호자-자녀 연결 (P0-5·6: OTP 주체 = 서버 증적) ─────────────
  /otp/challenges:
    post:
      tags: [linking]
      summary: 휴대전화 OTP 발송 — rate limit·재시도 횟수·잠금 정책 적용 (계약 초안 — 미구현, 현재는 seed 검증세션 사용)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [phone], properties: { phone: { type: string } } } } }
      responses:
        '201': { description: 발송됨(challengeId), content: { application/json: { schema: { type: object, properties: { challengeId: { type: string }, expiresAt: { type: string, format: date-time } } } } } }
        '429': { $ref: '#/components/responses/RateLimited' }
  /otp/verifications:
    post:
      tags: [linking]
      summary: OTP 검증 → 서버가 GuardianVerificationSession 발급(boolean 아님) (계약 초안 — 미구현)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [challengeId, code], properties: { challengeId: { type: string }, code: { type: string } } } } }
      responses:
        '201': { description: 검증 세션, content: { application/json: { schema: { type: object, properties: { verificationSessionId: { type: string }, expiresAt: { type: string, format: date-time } } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /academies/{academyId}/guardian-links:
    post:
      tags: [linking]
      summary: >
        보호자-자녀 연결 — 서버 OTP 증적 + 학원 선등록 보호자 연락처(또는 초대코드) 결합.
        이름·생년 일치만으로 자동 VERIFIED 금지(guardian-linking.ts evaluateLink 재현).
      description: >
        CSRF 계약 적용(Origin + X-CSRF-Token). actorUserId 는 세션에서 도출 — body 로 받지 않음.
        body 는 strict — 예상하지 않은 필드는 422 INVALID_BODY(R5 §6.2).
        원자 트랜잭션: OTP 검증세션 1회 소비 → 초대코드/선등록 연락처 결합 → 링크 생성.
        동시 요청은 DB UNIQUE·FOR UPDATE 로 직렬화 — 경쟁 패자는 409 CONFLICT.
      parameters:
        - $ref: '#/components/parameters/AcademyId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GuardianLinkRequest' } } }
      responses:
        '201': { description: 'VERIFIED — { status, linkId, participantId }', content: { application/json: { schema: { $ref: '#/components/schemas/LinkResult' } } } }
        '202': { description: 'PENDING(수동 심사)·REJECTED — { status, reason }', content: { application/json: { schema: { $ref: '#/components/schemas/LinkResult' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: 'CONFLICT — OTP 동시 소비 경쟁 패자·중복 링크(UNIQUE 위반)', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '422': { description: 'INVALID_BODY(+issues 필드 경로 배열)', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ── 출결 (예정 ≠ 실제) ────────────────────────────────────────
  /academies/{academyId}/notices:
    post:
      tags: [notices]
      summary: >
        공지 발행(#24) — staff. 수신자 산정은 서버: 전체 = ACTIVE 보호자 멤버십 /
        classId 지정 = 그 반 ACTIVE 등록 원생의 VERIFIED 연결 보호자(AudienceFilter 1단계)
      parameters: [{ $ref: '#/components/parameters/AcademyId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [title, body, audience], properties: { title: { type: string, maxLength: 80 }, body: { type: string, maxLength: 4000 }, audience: { type: string, maxLength: 200 }, classId: { type: string } } } } }
      responses:
        '201': { description: 'noticeId·recipients(서버 산정)' }
        '403': { $ref: '#/components/responses/Forbidden' }
    get:
      tags: [notices]
      summary: 공지 목록 — staff 는 수신·미열람 수 포함, 보호자는 미포함
      parameters: [{ $ref: '#/components/parameters/AcademyId' }]
      responses:
        '200': { description: notices 배열 }
  /academies/{academyId}/notices/{noticeId}/read:
    post:
      tags: [notices]
      summary: 읽음 기록 — 최초 시각 보존(멱등)
      parameters:
        - { $ref: '#/components/parameters/AcademyId' }
        - { name: noticeId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: 기록됨 }

  /academies/{academyId}/attendance-notices:
    post:
      tags: [attendance]
      summary: 보호자 결석/지각 통보(예정) — VERIFIED 링크만 · Outbox(ATTENDANCE_NOTICE_CREATED) (#23 구현됨 — POST /academies/{academyId}/attendance-notices 가 실 경로)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AttendanceNoticeInput' } } }
      responses:
        '201': { description: 생성(전체 엔티티 — id·작성자·시각 포함), content: { application/json: { schema: { $ref: '#/components/schemas/AttendanceNotice' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
  /academies/{academyId}/attendance-records:
    post:
      tags: [attendance]
      summary: 코치 실제 출결 확정 — ClassAssignment(ACTIVE) 담당만 · 수정=version+감사 이력 (#23 구현됨 — POST /academies/{academyId}/sessions/{sessionId}/attendance 가 실 경로. 완료=전원 체크 검증 /complete)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AttendanceRecordInput' } } }
      responses:
        '201': { description: 확정(전체 엔티티), content: { application/json: { schema: { $ref: '#/components/schemas/AttendanceRecord' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ── 청구 · 결제 · 환불 (P0-1·2·4·7) ──────────────────────────
  /academies/{academyId}/billing-periods:
    post:
      tags: [billing]
      summary: 수납 기간 생성 — 같은 (periodStart, periodEnd) 재요청 = 기존 행 반환(find-or-create 멱등). staff 전용. (구현됨 #40)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
      responses:
        '201': { description: '{ billingPeriodId, periodStart, periodEnd } — 기존 행 반환 시에도 동일 형식' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /academies/{academyId}/classes/{classId}/bulk-invoice-drafts:
    post:
      tags: [billing]
      summary: >
        반 단위 일괄 청구 초안 — ACTIVE 배정 전수에 기본 수강료 1라인 DRAFT 생성.
        같은 기간 비-VOID 청구 보유 원생은 자동 제외(skipped). staff 전용. (구현됨 #41)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: classId, in: path, required: true, schema: { type: string } }
      responses:
        '201': { description: '{ created, skipped, invoiceIds[] }' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { description: 반/기간 귀속 불일치·금액 정책 위반 }
  /academies/{academyId}/classes/{classId}/bulk-invoice-issue:
    post:
      tags: [billing]
      summary: >
        반 단위 일괄 발행 — 이 반 ACTIVE 배정 원생의 해당 기간 DRAFT 전부 ISSUED.
        원생별 outbox INVOICE_ISSUED 등록(단건 발행과 같은 계약)·재호출 = 0건 멱등. staff 전용. (구현됨 #41)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: classId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: '{ issued }' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /academies/{academyId}/invoices:
    post:
      tags: [billing]
      summary: >
        청구서 초안(DRAFT) 생성 — participant·billingPeriod 학원 귀속 검증(422),
        total = 라인 합산(서버 계산, 클라이언트 금액 신뢰 안 함). 발송은 별도 issue. staff 전용. (구현됨 #40)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
      responses:
        '201': { description: '{ invoiceId, total, status: DRAFT }' }
        '409': { description: 같은 원생·기간 청구서 중복 }
        '422': { description: participant/billingPeriod 귀속 불일치 }
    get:
      tags: [billing]
      summary: 내 자녀 청구서 목록 — 보호자 관점(VERIFIED 연결 자녀분만)
      description: >
        구현 기준 응답 = { invoices: GuardianInvoice[] } (billing/queries.ts listGuardianInvoices).
        페이지네이션 미구현 — 현재는 전량 반환. page[size]/page[cursor] 커서 계약은
        추후 목록 API 공통화(P1) 때 적용. 원장 관점(학원 전체) 목록도 미구현.
      parameters:
        - $ref: '#/components/parameters/AcademyId'
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, required: [invoices], properties: { invoices: { type: array, items: { $ref: '#/components/schemas/GuardianInvoice' } } } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /academies/{academyId}/payments/prepare:
    post:
      tags: [billing]
      summary: >
        합산 결제 준비 — 서버가 invoiceIds 로 금액 재계산·allocation 생성.
        같은 학원 Invoice 만 혼합 가능(canGuardianPayInvoices). GUARDIAN 역할 필수.
      description: >
        멱등 의미(idempotency.ts, 구현 기준): 같은 key+body → 200 재생 / 다른 body →
        409 IDEMPOTENCY_KEY_REUSED / 처리중 → 409 IN_PROGRESS (202 아님).
        R7 P0-3: 대상 Invoice 에 활성 attempt(AUTHORIZED 또는 미만료 PENDING)가 있으면
        멱등키가 달라도 409 ACTIVE_PAYMENT_ATTEMPT_EXISTS(+paymentId).
        UI 성공 ≠ PG CAPTURED — 확정은 webhook 만. CSRF 계약 적용.
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PaymentInput' } } }
      responses:
        '201': { description: '생성됨 — { paymentId, amount, status: PENDING }', content: { application/json: { schema: { $ref: '#/components/schemas/PaymentPrepareResult' } } } }
        '200': { description: '멱등 재생(같은 key+body) — 기존 결제 반환', content: { application/json: { schema: { $ref: '#/components/schemas/PaymentPrepareResult' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: 'error = IN_PROGRESS | IDEMPOTENCY_KEY_REUSED | ACTIVE_PAYMENT_ATTEMPT_EXISTS(+paymentId)', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '422': { description: 'error = INVALID_BODY | IDEMPOTENCY_KEY_REQUIRED | UNPROCESSABLE(+reason — 권한/정산 거부 사유)', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /academies/{academyId}/payments/{paymentId}:
    get:
      tags: [billing]
      summary: 결제 상태 재조회 — 완료 화면은 이 서버 진실 확인 후에만(13차 B P0-1 구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: paymentId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: '{ paymentId, status, amount, invoices[{invoiceId,status}] } — 결제자 본인·OWNER/DESK 만(그 외 404 존재 은닉)', content: { application/json: { schema: { $ref: '#/components/schemas/Payment' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /academies/{academyId}/refunds:
    post:
      tags: [billing]
      summary: 환불 요청 — 귀속은 PaymentAllocation 기준(P0-2). 상호승인 전 실행 안 됨. 요청액은 서버 계산(클라이언트 미입력). (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/RefundRequest' } } }
      responses:
        '201': { description: REQUESTED, content: { application/json: { schema: { $ref: '#/components/schemas/Refund' } } } }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /academies/{academyId}/refunds/{refundId}/approvals:
    post:
      tags: [billing]
      summary: >
        환불 승인 — side 는 서버가 세션 역할(OWNER=ACADEMY / GUARDIAN=보호자 측)로만 도출.
        body 없음(클라이언트 side 주장 금지 — 13차 B P1-3 로 계약을 구현에 동기화).
        보호자 측 = 실제 결제자만 + 승인 시점 링크 재검증(FOR UPDATE 직렬화).
        동일 사용자가 양측 승인 불가(state-machines.ts canApplyRefundApproval). (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: refundId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: '{ refundId, status } — 양측 완료 시 MUTUALLY_APPROVED', content: { application/json: { schema: { $ref: '#/components/schemas/Refund' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: 'APPROVAL_REJECTED — 동일인 양측 승인·결제자 아님·링크 철회(운영 심사) 등', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ── 반 · 수업 일정 — 기본선 1단계(#22, docs/15) ──────────────────
  /academies/{academyId}/classes:
    post:
      tags: [classes]
      summary: >
        반 생성(원장·데스크만) — 수업 유형 3종: FIXED_WEEKLY(매주 동일) /
        VARIABLE_BY_WEEKDAY(요일별 시간) / PARTICIPANT_SPECIFIC(원생별 개별·원생 지정 필수).
        슬롯 검증(domain scheduling.ts) + 담당 코치(재직 검증) ACTIVE 배정 + 감사. (구현됨)
      parameters: [ { $ref: '#/components/parameters/AcademyId' } ]
      responses:
        '201': { description: '{ classId }' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
    get:
      tags: [classes]
      summary: 반 목록 — 슬롯·담당 코치 포함(학원 멤버). (구현됨)
      parameters: [ { $ref: '#/components/parameters/AcademyId' } ]
      responses: { '200': { description: '{ classes: [...] }' } }
  /academies/{academyId}/classes/{classId}/sessions/generate:
    post:
      tags: [classes]
      summary: >
        반복 일정 전개(멱등) — 구간 내 SCHEDULED 만 교체·휴강(CANCELED)·완료 보존.
        class FOR UPDATE 로 동시 전개 직렬화. (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: classId, in: path, required: true, schema: { type: string } }
      responses:
        '201': { description: '{ created, keptCanceled }' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /academies/{academyId}/classes/{classId}/sessions:
    get:
      tags: [classes]
      summary: 세션 목록(from/to 필터) — (date, startTime) 정렬. (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: classId, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: '{ sessions: [...] }' } }
  /academies/{academyId}/sessions/{sessionId}/cancellation:
    post:
      tags: [classes]
      summary: >
        휴강(멱등) — CANCELED+사유·감사·Outbox(CLASS_SESSION_CANCELED — 회차 차감·보강·공지는
        청구·알림 트랙 소비). 완료 수업 휴강 불가 409. 재전개에도 휴강 보존. (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: sessionId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: '{ sessionId, status: CANCELED }' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: 완료 수업 휴강 시도 }

  # ── 학생 수명주기 · 출결 — 기본선 2단계(#23) ─────────────────
  /academies/{academyId}/participants:
    post:
      tags: [attendance]
      summary: 학생 등록(원장·데스크만) — 선등록 보호자 연락처(OTP 결합 근거) 포함. (구현됨)
      parameters: [ { $ref: '#/components/parameters/AcademyId' } ]
      responses: { '201': { description: '{ participantId }' }, '403': { $ref: '#/components/responses/Forbidden' } }
    get:
      tags: [attendance]
      summary: 원생 목록(staff 전용) — PII 미포함(participantId·name·ageLabel·status만). 청구 초안 원생 선택용. (구현됨 #40)
      parameters: [ { $ref: '#/components/parameters/AcademyId' } ]
      responses: { '200': { description: '{ participants: [{ participantId, name, ageLabel, status }] }' }, '403': { $ref: '#/components/responses/Forbidden' } }
  /academies/{academyId}/participants/{participantId}/status:
    post:
      tags: [attendance]
      summary: 재원 상태 전이 — TRIAL/ENROLLED/ON_BREAK/WITHDRAWN 상태머신·휴원/퇴원 시 배정 자동 종료·멱등. (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: participantId, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: '{ participantId, status }' }, '409': { description: 불법 전이 } }
  /academies/{academyId}/participants/{participantId}/enrollments:
    post:
      tags: [attendance]
      summary: 반 배정 — class FOR UPDATE 정원 검증(초과·중복 409)·재원 상태 필수. (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: participantId, in: path, required: true, schema: { type: string } }
      responses: { '201': { description: '{ enrollmentId }' }, '409': { description: 정원 초과·중복·비재원 } }
  /academies/{academyId}/sessions/{sessionId}/attendance:
    post:
      tags: [attendance]
      summary: 출결 기록(담당 코치·학원) — 세션 대상 검증·수정 이력(version+감사)·휴강 세션 거부. (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: sessionId, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: '{ recorded, updated }' }, '403': { $ref: '#/components/responses/Forbidden' } }
    get:
      tags: [attendance]
      summary: 세션 출결 조회(담당 코치·학원). (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: sessionId, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: '{ records }' } }
  /academies/{academyId}/sessions/{sessionId}/complete:
    post:
      tags: [attendance]
      summary: 수업 완료 — 대상 전원 출결 지정 검증(미체크 409+missing)·멱등·Outbox(ACTUAL_ATTENDANCE_RECORDED). (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: sessionId, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: '{ sessionId, status: COMPLETED }' }, '409': { description: 미체크 원생 존재 } }

  /academies/{academyId}/guardian-links/{linkId}/revocation:
    post:
      tags: [linking]
      summary: >
        보호자-원생 연결 철회 (13차 D P0-1 구현) — 학원(OWNER·DESK) 또는 링크 당사자 보호자만.
        REVOKED 상태(REJECTED=신청 거절과 구분) + 전 권한 flag 회수 + revokedAt/By/reason 이력 +
        AuditLog + Outbox(GUARDIAN_LINK_REVOKED — pendingRefunds 운영 심사 신호). 멱등(재철회 200).
        잠금 계약: Link 행만 FOR UPDATE(전역 순서 Refund→Link — 승인과 같은 행에서 직렬화).
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: linkId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [reasonCode], additionalProperties: false, properties: { reasonCode: { type: string, maxLength: 40 }, reasonText: { type: string, maxLength: 500 } } } } }
      responses:
        '200': { description: '{ linkId, status: REVOKED, pendingRefunds? } — 멱등' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── 소통(채팅) — 배치 14 (docs/12 개정 계약 · 13차 C P1-6 등재) ──────
  /academies/{academyId}/chat/dms:
    post:
      tags: [chat]
      summary: >
        DM 개설(find-or-create · dmKey UNIQUE + onConflict 수렴) — OWNER_COACH_DM: 원장→재직 코치 /
        GUARDIAN_DM: VERIFIED 링크 보호자→학원(원생 컨텍스트). 201=신규, 200=기존 방. (구현됨.
        코치→원장·원장→보호자 방향은 P1 잔여)
      parameters: [ { $ref: '#/components/parameters/AcademyId' } ]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [type], additionalProperties: false, properties: { type: { type: string, enum: [OWNER_COACH_DM, GUARDIAN_DM] }, targetUserId: { type: string }, participantId: { type: string } } } } }
      responses:
        '201': { description: '{ roomId, created: true }', content: { application/json: { schema: { type: object, properties: { roomId: { type: string }, created: { type: boolean } } } } } }
        '200': { description: '{ roomId, created: false } — 기존 방', content: { application/json: { schema: { type: object, properties: { roomId: { type: string }, created: { type: boolean } } } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /academies/{academyId}/chat/rooms:
    get:
      tags: [chat]
      summary: 내 방 목록 — unacked = ACK 필요 메시지 미확인 수(일반 안읽음 아님). (구현됨)
      parameters: [ { $ref: '#/components/parameters/AcademyId' } ]
      responses:
        '200': { description: '{ rooms: [{ roomId, type, title, lastReadAt, unacked }] }' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /academies/{academyId}/chat/rooms/{roomId}/messages:
    get:
      tags: [chat]
      summary: >
        방 메시지 목록(멤버만·(createdAt,id) 안정 정렬). HEALTH 는 조회 시점 canViewHealthInfo
        재인가(권한 철회 시 본문·카드 가림). 민감(BILLING·HEALTH) 열람 = chat.sensitive_message.viewed
        AuditLog. (구현됨 — cursor pagination 은 P2)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: roomId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: '{ messages: [...] } — soft delete 는 본문 가림·원문 보존' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [chat]
      summary: >
        메시지 발송 — BILLING 은 invoiceId 참조만(카드 = 서버가 청구서 DB 에서 생성 · 13차 C P0-1,
        클라이언트 contextCard 금지) · 방 원생 ≠ 메시지 원생 거부(P0-2) · HEALTH 는 방의 보호자
        전원 canViewHealthInfo 필수(P0-3) · clientMessageId 전송 멱등(P1-5) · 발송 전체 AuditLog+Outbox. (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: roomId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [kind, body], additionalProperties: false, properties: { kind: { type: string, enum: [NORMAL_CHAT, NOTICE, ACK_REQUIRED, URGENT_ACK_REQUIRED, OPERATIONAL_TASK] }, category: { type: string, enum: [GENERAL, BILLING, HEALTH], default: GENERAL }, body: { type: string, maxLength: 2000 }, invoiceId: { type: string }, relatedParticipantId: { type: string }, clientMessageId: { type: string, maxLength: 64 } } } } }
      responses:
        '201': { description: '{ messageId, status } — 같은 clientMessageId 재시도도 201(기존 메시지)' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /academies/{academyId}/chat/messages/{messageId}/read:
    post:
      tags: [chat]
      summary: 읽음 — READ ≠ 확인(unacked 유지). 발신자 자기 read = 멱등 no-op(상태 불변). (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: messageId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: '{ status }' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /academies/{academyId}/chat/messages/{messageId}/ack:
    post:
      tags: [chat]
      summary: >
        확인(ACKNOWLEDGED) — ACK 필요 메시지만·발신자 금지·전 수신자 확인 시 상태 전이(message
        FOR UPDATE 로 동시 ACK 직렬화). 중복 ACK = 멱등 200. AuditLog 기록. (구현됨)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: messageId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: '{ status }' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: '확인 수명주기 없는 메시지·상태 전이 불가' }
  /academies/{academyId}/chat/messages/{messageId}/resolve:
    post:
      tags: [chat]
      summary: 처리 완료(RESOLVED) — ACKNOWLEDGED 이후에만·note 를 같은 thread 에 저장·AuditLog. (구현됨 — 담당자(assignee) 권한 모델은 P2)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - { name: messageId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [note], additionalProperties: false, properties: { note: { type: string, maxLength: 1000 } } } } }
      responses:
        '200': { description: '{ status: RESOLVED }' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: '확인 전 처리 시도' }

  # ── PG 웹훅 (P0-3) ───────────────────────────────────────────
  /webhooks/pg/{provider}:
    post:
      tags: [webhooks]
      security: []
      summary: >
        PG 웹훅 수신 — 처리 순서: 인증(fail-closed) → inbox unique insert(중복 차단) →
        webhooks.ts decidePaymentWebhook(중복/역순/재조회 판단) →
        상태변경+outbox 를 한 트랜잭션으로. 오래된 이벤트가 최종 상태를 되돌리지 않는다.
      description: >
        [인증 — R7 P0-1 fail-closed] provider = mockpg(개발 시뮬 전용):
        enableMockPg && NODE_ENV !== production && 시크릿 설정 시에만 열림(아니면 404),
        X-Webhook-Secret 헤더 불일치 = 401 SIGNATURE_INVALID.
        그 외 provider: 등록된 verifier 가 raw body 서명을 검증해야 통과(불일치 401),
        미등록 provider = 404 NOT_FOUND(allowlist).

        ⚠️ 현재 requestBody(paymentId·targetStatus 직접 지정)는 mockpg 전용(dev).
        실 provider adapter 는 미구현 — 연동 시 adapter 가 서명 검증 후
        (provider, providerPaymentId)로 내부 결제를 찾고 provider event type 을
        내부 상태로 매핑한다(R7 P0-4). 그때 이 스키마를 provider event 계약으로 대체.
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string } }
        - { name: X-Webhook-Secret, in: header, required: false, schema: { type: string }, description: 'mockpg 전용 공유 시크릿. 실 provider 는 verifier 가 자체 서명 헤더를 검증' }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PgWebhookEvent' } } }
      responses:
        '200': { description: '수신(중복·stale 포함 — 항상 200, 내부 판단은 inbox). body = { decision: APPLY | IGNORE_ALREADY_SEEN | ACK_NO_STATE_CHANGE | IGNORE_STALE | RECONCILE | REJECT_INVALID }', content: { application/json: { schema: { type: object, required: [decision], properties: { decision: { type: string } } } } } }
        '401': { description: 'SIGNATURE_INVALID — 서명/시크릿 불일치', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: 'NOT_FOUND — 미등록 provider 또는 mockpg 게이트 미충족', content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '422': { description: INVALID_BODY, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ── 사진 동의 (P0-9) ─────────────────────────────────────────
  /academies/{academyId}/participants/{participantId}/photo-consent:
    get:
      tags: [consent]
      summary: 현재 동의 상태(grants) 조회 — staff·VERIFIED 보호자(#19 구현)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - $ref: '#/components/parameters/ParticipantId'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PhotoConsentRecord' } } } }
    put:
      tags: [consent]
      summary: 동의 갱신 — 목적×대상 grant 쌍 + 정책버전. If-Match(version) 불일치 = 409. VERIFIED 보호자만(#19 구현)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - $ref: '#/components/parameters/ParticipantId'
        - { name: If-Match, in: header, required: true, schema: { type: string }, description: 리소스 ETag — 불일치 시 409 VERSION_CONFLICT }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PhotoConsentInput' } } }
      responses:
        '200': { description: 갱신됨, content: { application/json: { schema: { $ref: '#/components/schemas/PhotoConsentRecord' } } } }
        '409': { description: VERSION_CONFLICT, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /academies/{academyId}/participants/{participantId}/photo-consent/revocations:
    post:
      tags: [consent]
      summary: 동의 철회 — 이후 발송·finalize 차단(canSendPhotoAsset 재검증). 멱등(#19 구현)
      parameters:
        - $ref: '#/components/parameters/AcademyId'
        - $ref: '#/components/parameters/ParticipantId'
      responses:
        '201': { description: 철회 기록(revokedAt) }

  # ── 계정 라이프사이클 (F14) ──────────────────────────────────
  /me/academy-exits:
    post:
      tags: [account]
      summary: 학원 나가기 — 멤버십 ENDED + 해당 학원 세션 컨텍스트 폐기 (계약 초안 — 미구현)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [academyId], properties: { academyId: { type: string } } } } }
      responses:
        '201': { description: 처리됨 }
  /me/deletion-requests:
    post:
      tags: [account]
      summary: 계정 탈퇴 요청 — 자동결제 해지 선행. 보관정책은 docs/09 + retention matrix(법률 검토 후). (계약 초안 — 미구현)
      responses:
        '201': { description: '접수(recoverableUntil 포함)', content: { application/json: { schema: { type: object, properties: { deletionRequestId: { type: string }, recoverableUntil: { type: string, format: date-time } } } } } }
  /me/deletion-requests/{deletionRequestId}:
    delete:
      tags: [account]
      summary: 탈퇴 요청 취소(recoverableUntil 이내) (계약 초안 — 미구현)
      parameters:
        - { name: deletionRequestId, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: 취소됨 }

  # ── 사진 파이프라인 사전 코어(#19) — 스토리지 어댑터 미주입 시 전부 501(fail-closed) ──
  /academies/{academyId}/photos:
    post:
      tags: [photos]
      summary: 업로드 의도 — 코치·staff. PENDING_UPLOAD 자산 + 어댑터 업로드 타깃(presigned 계약)
      parameters: [{ $ref: '#/components/parameters/AcademyId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [contentType, byteSize], properties: { sessionId: { type: string }, contentType: { type: string, example: image/jpeg }, byteSize: { type: integer, maximum: 26214400 } } } } }
      responses:
        '201': { description: 'photoId + upload{url,method,headers,expiresAt}' }
        '501': { description: STORAGE_NOT_CONFIGURED — 사업자 결정 대기 }
  /academies/{academyId}/photos/{photoId}/finalize:
    post:
      tags: [photos]
      summary: >
        확정 — 등장 원생 태그 + 목적×대상. 동의 게이트(canSendPhotoAsset)가 서버에서 강제:
        미동의 원생 있으면 422 CONSENT_REQUIRED + blockedParticipantIds(제거 또는 추가 동의 유도)
      parameters:
        - { $ref: '#/components/parameters/AcademyId' }
        - { name: photoId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [participantIds, purpose, audience], properties: { participantIds: { type: array, items: { type: string } }, purpose: { type: string }, audience: { type: string } } } } }
      responses:
        '200': { description: UPLOADED 확정 }
        '422': { description: 'CONSENT_REQUIRED(+blockedParticipantIds) 또는 검증 실패' }
  /academies/{academyId}/photos/{photoId}/url:
    get:
      tags: [photos]
      summary: 열람 URL — staff·업로더·보호자(자기 자녀 태그+canReceivePhotos, 열람 감사). 권한 없음 = 404 은닉
      parameters:
        - { $ref: '#/components/parameters/AcademyId' }
        - { name: photoId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: 'url(단기)·contentType' }
        '404': { description: 없음 또는 권한 없음 }

  # ── 휴무·회차·일할(#38 — PC draft 정본화 1): "숫자 직접 수정 금지" ──
  /academies/{academyId}/closures:
    post:
      tags: [classes]
      summary: 휴무 event 등록 — 범위 내 SCHEDULED 세션 취소(closureId 추적)·회차 재계산, staff 만
      parameters: [{ $ref: '#/components/parameters/AcademyId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [scope, dateStart, dateEnd, closureType, reason, deductSessions], properties: { scope: { type: string, enum: [ACADEMY, CLASS] }, classId: { type: string }, dateStart: { type: string, format: date }, dateEnd: { type: string, format: date }, closureType: { type: string }, reason: { type: string }, deductSessions: { type: boolean } } } } }
      responses:
        '201': { description: 'closureId·canceledSessions' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { description: 기간 역전·반 불일치 }
    get:
      tags: [classes]
      summary: 휴무 목록(최근 100)
      parameters: [{ $ref: '#/components/parameters/AcademyId' }]
      responses:
        '200': { description: closures 배열 }
  /academies/{academyId}/closures/{closureId}/revocation:
    post:
      tags: [classes]
      summary: 휴무 철회 — 이 이벤트가 취소한 세션만 SCHEDULED 복원(다른 사유 취소 불변)·멱등
      parameters:
        - { $ref: '#/components/parameters/AcademyId' }
        - { name: closureId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: 'restoredSessions' }
        '404': { description: 이벤트 없음 }
  /academies/{academyId}/classes/{classId}/session-stats:
    get:
      tags: [classes]
      summary: 회차 집계 — DB 세션 정본(CANCELED 모수 제외), total·completed·canceled·remaining
      parameters:
        - { $ref: '#/components/parameters/AcademyId' }
        - { name: classId, in: path, required: true, schema: { type: string } }
        - { name: from, in: query, required: true, schema: { type: string, format: date } }
        - { name: to, in: query, required: true, schema: { type: string, format: date } }
      responses:
        '200': { description: 집계 }
  /academies/{academyId}/classes/{classId}/proration-quote:
    post:
      tags: [billing]
      summary: >
        중간입회 일할 견적 — 헌법: 일할 = 남은회차/전체회차 × 요금. staff 만.
        세션 전개 시 DB_SESSIONS 정본, 미전개 시 SLOT_CALENDAR(시간표+유효 휴무, payment-engine 정합)
      parameters:
        - { $ref: '#/components/parameters/AcademyId' }
        - { name: classId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [periodStart, periodEnd, joinDate, baseFee], properties: { periodStart: { type: string, format: date }, periodEnd: { type: string, format: date }, joinDate: { type: string, format: date }, baseFee: { type: integer } } } } }
      responses:
        '200': { description: 'totalSessions·remainingSessions·amount·basis' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { description: 유효 회차 0·시간표 없음 등 }

  /academies/{academyId}/notifications:
    get:
      tags: [notices]
      summary: 인앱 알림(파일럿 P0) — outbox 소비 결과, 본인 수신분만(최근 50)
      parameters: [{ $ref: '#/components/parameters/AcademyId' }]
      responses:
        '200': { description: notifications 배열(category·title·body·ref·readAt) }
  /academies/{academyId}/notifications/{notificationId}/read:
    post:
      tags: [notices]
      summary: 알림 읽음 — 소유자만·최초 시각 보존(멱등)
      parameters:
        - { $ref: '#/components/parameters/AcademyId' }
        - { name: notificationId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: 기록됨 }

  /academies/{academyId}/incidents:
    post:
      tags: [safety]
      summary: >
        안전사고 기록(#32) — 담당 코치(ACTIVE 배정×등록) 또는 staff. 발생 시각 = 서버 기록,
        AuditLog(상황 원문 미포함) + Outbox SAFETY_INCIDENT_REPORTED(원장 알림 REQUIRED tier)
      parameters:
        - { name: academyId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [participantId, type, severity, situation, classContinued, followUpNeeded, guardianContact]
              properties:
                participantId: { type: string }
                sessionId: { type: string }
                type: { type: string, enum: [MINOR_INJURY, CONDITION, CLASS_HALT, SAFETY_ACCIDENT, OTHER] }
                severity: { type: string, enum: [MINOR, CAUTION, SEVERE] }
                situation: { type: string, maxLength: 2000 }
                location: { type: string, maxLength: 200 }
                firstAid: { type: string, maxLength: 1000 }
                classContinued: { type: boolean }
                followUpNeeded: { type: boolean }
                guardianContact: { type: string, enum: [CONTACTED, NEEDED, NOT_NEEDED] }
      responses:
        '201': { description: '기록됨(incidentId·occurredAt=서버 시각)' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { description: 원생·세션 불일치 등 }
    get:
      tags: [safety]
      summary: 안전사고 목록 — staff 전체·코치 본인 보고분(열람도 감사), 보호자 표면 없음(v1)
      parameters:
        - { name: academyId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: incidents 배열 }
        '403': { $ref: '#/components/responses/Forbidden' }

  /academies/{academyId}/members:
    get:
      tags: [academies]
      summary: 멤버 목록(#31) — staff 전용. 코치 전달사항 대상 선택 정본(PII 미포함·PLATFORM_ADMIN 비노출)
      parameters:
        - { name: academyId, in: path, required: true, schema: { type: string } }
        - { name: role, in: query, required: false, schema: { type: string, example: COACH } }
      responses:
        '200':
          description: 멤버 목록
          content: { application/json: { schema: { type: object, properties: { members: { type: array, items: { type: object, properties: { userId: { type: string }, name: { type: string }, roles: { type: array, items: { type: string } } } } } } } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  /academies/{academyId}/billing/summary:
    get:
      tags: [billing]
      summary: >
        원장 수납 관제 집계(#25) — staff(OWNER·DESK)만. 미납 = open 청구 total − 기수납 배분,
        수납 = 유효결제(CAPTURED·PARTIALLY_REFUNDED·REFUNDED) − 완료환불 (세션 리뷰 반영)
      parameters:
        - { name: academyId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: 수납 집계
          content:
            application/json:
              schema:
                type: object
                required: [unpaidCount, unpaidKrw, paidCount, paidKrw, billedKrw, capturedKrw]
                properties:
                  unpaidCount: { type: integer }
                  unpaidKrw: { type: integer }
                  paidCount: { type: integer }
                  paidKrw: { type: integer }
                  billedKrw: { type: integer }
                  capturedKrw: { type: integer }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ── Admin 백엔드 1차(#27) — PLATFORM_ADMIN 전용 경계 ───────────
  # 일반 역할 접근 = 404(표면 은닉) · PLATFORM_ADMIN 의 일반 학원 API = 403 (대칭 격리)
  # 상태 변경 전부 감사(AuditLog actorRole=PLATFORM_ADMIN)
  /admin/overview:
    get:
      tags: [admin]
      summary: 플랫폼 관제 — MRR(ACTIVE 구독 월요금 합)·플랜별 카운트·수납/미납·환불 대기
      responses:
        '200': { description: '집계(academies·participants·subscription{mrrKrw,activeByPlan,priceTable}·tuition·refundsPending)' }
        '404': { description: 비관리자 — 표면 은닉 }
  /admin/academies:
    get:
      tags: [admin]
      summary: 학원별 지표 — 구독(플랜·상태·가격)·재원 원생 수·미납액·정지 여부
      responses:
        '200': { description: 학원 목록 }
        '404': { description: 비관리자 }
  /admin/academies/{academyId}/subscription:
    put:
      tags: [admin]
      summary: 구독 지정·변경 — 가격정책 확정(2026-07-18) BASIC 29,000/PRO 99,000, 가격 스냅샷 저장
      parameters: [{ name: academyId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [plan], properties: { plan: { type: string, enum: [BASIC, PRO] } } } } }
      responses:
        '200':
          description: 지정됨 — 같은 플랜 재지정은 기존 스냅샷 가격 유지(grandfather 보호)
          content: { application/json: { schema: { type: object, required: [subscriptionId, priceKrwMonthly], properties: { subscriptionId: { type: string }, priceKrwMonthly: { type: integer } } } } }
        '404': { description: 학원 없음 또는 비관리자(은닉) }
        '422': { description: INVALID_BODY }
  /admin/academies/{academyId}/subscription/cancellation:
    post:
      tags: [admin]
      summary: 구독 해지 — CANCELED 는 MRR 제외, 멱등
      parameters: [{ name: academyId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: false
        content: { application/json: { schema: { type: object, properties: { reason: { type: string, maxLength: 500 } } } } }
      responses:
        '200': { description: '해지됨(subscriptionId)' }
        '404': { description: 구독 없음 또는 비관리자(은닉) }
  /admin/academies/{academyId}/suspension:
    post:
      tags: [admin]
      summary: 학원 정지 — 사유 필수, 전 멤버 세션 즉시 폐기 + guard 가 ACADEMY_SUSPENDED 403
      parameters: [{ name: academyId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [reason], properties: { reason: { type: string } } } } }
      responses:
        '200': { description: '정지됨(revokedUserSessions) — ACTIVE 일반 멤버만 폐기(PLATFORM_ADMIN·시행자 제외)' }
        '404': { description: 학원 없음 또는 비관리자(은닉) }
        '422': { description: 사유 누락 }
    delete:
      tags: [admin]
      summary: 정지 해제 — 멱등
      parameters: [{ name: academyId, in: path, required: true, schema: { type: string } }]
      responses:
        '204': { description: 해제됨 }
        '404': { description: 학원 없음 또는 비관리자(은닉) }
  /admin/academies/{academyId}/subscription/status:
    post:
      tags: [admin]
      summary: 구독 상태 전이(#39-④) — 상태머신 강제(TRIAL·PAST_DUE 도달 경로), ledger 기록·멱등
      parameters: [{ name: academyId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [status], properties: { status: { type: string, enum: [TRIAL, ACTIVE, PAST_DUE, CANCELED] }, reason: { type: string, maxLength: 300 } } } } }
      responses:
        '200': { description: 전이됨 }
        '404': { description: 구독 없음 또는 비관리자(은닉) }
        '409': { description: 상태머신 밖 전이 }
  /admin/academies/{academyId}/subscription/ledger:
    get:
      tags: [admin]
      summary: 구독 이력 ledger(#39-④) — append-only(플랜·가격·상태 전 변화), 최근 100
      parameters: [{ name: academyId, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: ledger 배열 }
  /admin/naver/search:
    get:
      tags: [admin]
      summary: 네이버 검색 래퍼(#39-⑥ HQ-2) — blog|news|webkr. env 미설정 = 501 fail-closed
      parameters:
        - { name: type, in: query, required: true, schema: { type: string, enum: [blog, news, webkr] } }
        - { name: q, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: 네이버 응답 원문 }
        '501': { description: NAVER_NOT_CONFIGURED }
        '502': { description: UPSTREAM_FAILED }
  /admin/naver/datalab:
    post:
      tags: [admin]
      summary: 데이터랩 검색어 트렌드(#39-⑥) — 키워드 그룹 1~5. 성장판·매거진 키워드 검증용
      responses:
        '200': { description: 트렌드 결과 }
        '501': { description: NAVER_NOT_CONFIGURED }

  /admin/support-views:
    get:
      tags: [admin]
      summary: SupportView 이력 조회 — 최근 50건(학원명·사유·만료·철회)
      responses:
        '200': { description: supportViews 배열 }
    post:
      tags: [admin]
      summary: SupportView 발급 — 사유 필수, 기본 30분·최대 60분 만료, 발급·철회 전부 감사
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [academyId, reason], properties: { academyId: { type: string }, reason: { type: string }, minutes: { type: integer, minimum: 5, maximum: 60 } } } } }
      responses:
        '201': { description: '발급(supportViewId·expiresAt)' }
        '404': { description: 학원 없음 또는 비관리자(은닉) }
        '422': { description: 사유 누락·알 수 없는 열람 리소스(SUPPORT_VIEW_RESOURCE 밖) }
  /admin/support-views/{supportViewId}/revocation:
    post:
      tags: [admin]
      summary: SupportView 철회 — 멱등
      parameters: [{ name: supportViewId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: false
        content: { application/json: { schema: { type: object, properties: { reason: { type: string, maxLength: 500 } } } } }
      responses:
        '200': { description: 철회됨 }
        '404': { description: 대상 없음 또는 비관리자(은닉) }
  /admin/users/{userId}/session-revocation:
    post:
      tags: [admin]
      summary: 사용자 전 세션 강제 폐기 — 사유 필수(계정 탈취 대응)
      parameters: [{ name: userId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [reason], properties: { reason: { type: string } } } } }
      responses:
        '204': { description: 폐기됨 }
        '404': { description: 대상 없음 또는 비관리자(은닉) }
        '422': { description: 사유 누락 }

  # ── 프로그램 스튜디오 PS1 (docs/20·21·22) — 원장의 프로그램 저작.
  #    불변식: DRAFT 만 편집 · PUBLISHED 직접 수정 금지(복제로만) ·
  #    이름은 식별자가 아니다(Activity 불변 ID + Revision) · 변이 = OWNER(PS1).
  /academies/{academyId}/programs:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
    post:
      tags: [program-studio]
      summary: 프로그램 생성 — 진행 방식 복수 조합, 첫 DRAFT 버전 자동 생성
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [name, modes], properties: {
          name: { type: string, maxLength: 80 }, description: { type: string },
          targetAgeLabel: { type: string },
          modes: { type: array, items: { type: string, enum: [EXPERIENCE, SKILL_MASTERY, SEASONAL, MEASUREMENT, COURSE] }, minItems: 1 } } } } }
      responses:
        '201': { description: 생성 — programId·versionId(첫 DRAFT) }
        '403': { description: OWNER 아님 }
        '422': { description: 방식 중복·미지값 }
    get:
      tags: [program-studio]
      summary: 프로그램 목록 — 방식·버전 요약 포함(학원 멤버 조회)
      responses: { '200': { description: 'programs[]' } }
  /academies/{academyId}/programs/{programId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: programId, in: path, required: true, schema: { type: string } }
    patch:
      tags: [program-studio]
      summary: 프로그램 정보 수정·보관(archive) — 버전 콘텐츠와 별개
      responses: { '200': { description: 수정됨 }, '404': { description: 없음(교차 테넌트 포함) } }
  /academies/{academyId}/programs/{programId}/versions:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: programId, in: path, required: true, schema: { type: string } }
    post:
      tags: [program-studio]
      summary: 새 버전(DRAFT) — basedOnVersionId 지정 시 레벨·커리큘럼 딥카피(게시본 수정 경로)
      responses: { '201': { description: versionId }, '422': { description: 복제 원본 없음 } }
  /academies/{academyId}/versions/{versionId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: versionId, in: path, required: true, schema: { type: string } }
    get:
      tags: [program-studio]
      summary: 버전 상세 — 레벨·구조·회차·회차별 활동(개정판 이름 포함)
      responses: { '200': { description: 상세 }, '404': { description: 없음 } }
  /academies/{academyId}/versions/{versionId}/publish:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: versionId, in: path, required: true, schema: { type: string } }
    post:
      tags: [program-studio]
      summary: 게시 — DRAFT→PUBLISHED(멱등) · outbox PROGRAM_VERSION_PUBLISHED
      responses: { '200': { description: 게시됨 }, '422': { description: 전이 불가 } }
  /academies/{academyId}/versions/{versionId}/levels:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: versionId, in: path, required: true, schema: { type: string } }
    post:
      tags: [program-studio]
      summary: 단계 생성 — 단계명은 데이터(enum 아님) · DRAFT 만
      responses: { '201': { description: levelId }, '422': { description: 게시본 편집 시도·이름 중복 } }
  /academies/{academyId}/versions/{versionId}/levels/{levelId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: versionId, in: path, required: true, schema: { type: string } }
      - { name: levelId, in: path, required: true, schema: { type: string } }
    patch: { tags: [program-studio], summary: 단계 수정(DRAFT 만), responses: { '200': { description: 수정됨 } } }
    delete: { tags: [program-studio], summary: 단계 삭제(DRAFT 만), responses: { '200': { description: 삭제됨 } } }
  /academies/{academyId}/growth-domains:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
    post:
      tags: [program-studio]
      summary: 성장 영역 생성(FMS 등 — 테넌트 소유 데이터, 템플릿은 seed 복사)
      responses: { '201': { description: domainId } }
    get: { tags: [program-studio], summary: 성장 영역 목록, responses: { '200': { description: 'domains[]' } } }
  /academies/{academyId}/growth-domains/{domainId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: domainId, in: path, required: true, schema: { type: string } }
    patch: { tags: [program-studio], summary: 성장 영역 수정(active 토글 포함 — 삭제 대신 비활성), responses: { '200': { description: 수정됨 } } }
  /academies/{academyId}/activities:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
    post:
      tags: [program-studio]
      summary: 활동 생성 — Activity(불변 ID) + Revision 1(콘텐츠) 동시 생성
      responses: { '201': { description: activityId·revisionId } }
    get: { tags: [program-studio], summary: 활동 목록(현재 개정판·성장영역 태그 포함), responses: { '200': { description: 'activities[]' } } }
  /academies/{academyId}/activities/{activityId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: activityId, in: path, required: true, schema: { type: string } }
    patch:
      tags: [program-studio]
      summary: 활동 수정 — 게시 커리큘럼이 참조 중이면 자동 새 개정판(과거 기록 보존)
      responses: { '200': { description: revisionId·newRevision } }
  /academies/{academyId}/activities/{activityId}/archive:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: activityId, in: path, required: true, schema: { type: string } }
    post: { tags: [program-studio], summary: 활동 보관 — 신규 배치 금지·기존 참조 유지(멱등), responses: { '200': { description: 보관됨 } } }
  /academies/{academyId}/activities/{activityId}/growth-tags:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: activityId, in: path, required: true, schema: { type: string } }
    put:
      tags: [program-studio]
      summary: 현재 개정판의 성장영역 태그 세트 교체 — PRIMARY 정확히 1
      responses: { '200': { description: 교체됨 }, '422': { description: PRIMARY 위반·중복·영역 없음 } }
  /academies/{academyId}/versions/{versionId}/sections:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: versionId, in: path, required: true, schema: { type: string } }
    post: { tags: [program-studio], summary: 커리큘럼 구조 생성(분기·시즌 등 임의 계층 · DRAFT 만), responses: { '201': { description: sectionId } } }
  /academies/{academyId}/versions/{versionId}/sections/{sectionId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: versionId, in: path, required: true, schema: { type: string } }
      - { name: sectionId, in: path, required: true, schema: { type: string } }
    delete: { tags: [program-studio], summary: 구조 삭제(하위·회차 없을 때 · DRAFT 만), responses: { '200': { description: 삭제됨 } } }
  /academies/{academyId}/versions/{versionId}/sessions:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: versionId, in: path, required: true, schema: { type: string } }
    post: { tags: [program-studio], summary: 회차(주차) 생성 — 주차 수 제한 없음(DRAFT 만), responses: { '201': { description: curriculumSessionId } } }
  /academies/{academyId}/versions/{versionId}/sessions/{curriculumSessionId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: versionId, in: path, required: true, schema: { type: string } }
      - { name: curriculumSessionId, in: path, required: true, schema: { type: string } }
    delete: { tags: [program-studio], summary: 회차 삭제(DRAFT 만), responses: { '200': { description: 삭제됨 } } }
  /academies/{academyId}/curriculum-sessions/{curriculumSessionId}/activities:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: curriculumSessionId, in: path, required: true, schema: { type: string } }
    put:
      tags: [program-studio]
      summary: 회차 활동 세트 교체 — 개정판 ID 로 연결·ARCHIVED 배치 금지·활동 수 고정 없음(DRAFT 만)
      responses: { '200': { description: 교체됨 }, '422': { description: 게시본·보관 활동·중복 배치 } }

  # ── 가져오기 스테이징 PS3 (docs/20 §4 · 지시서 §8) — 미리보기 전 운영 무변경·
  #    원본 보존·자동 병합 금지·같은 파일 중복 커밋 방지·batch 되돌리기(archive).
  /academies/{academyId}/imports:
    parameters: [{ $ref: '#/components/parameters/AcademyId' }]
    post:
      tags: [program-studio]
      summary: CSV 스테이징 — 파싱→열 자동매핑→정규화→검증→중복 후보(운영 데이터 무변경)
      responses:
        '201': { description: batchId·요약(total/valid/invalid/withDuplicates·reuploadOfCommitted) }
        '422': { description: 이름 열 미발견·행 수 초과 }
    get: { tags: [program-studio], summary: 가져오기 배치 목록, responses: { '200': { description: 'batches[]' } } }
  /academies/{academyId}/imports/{batchId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: batchId, in: path, required: true, schema: { type: string } }
    get:
      tags: [program-studio]
      summary: 미리보기 — 행별 원본(raw)·정규화 제안·검증 메시지·중복 후보·처리 상태
      responses: { '200': { description: 상세 }, '404': { description: 없음(교차 테넌트 포함) } }
  /academies/{academyId}/imports/{batchId}/rows/{rowId}:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: batchId, in: path, required: true, schema: { type: string } }
      - { name: rowId, in: path, required: true, schema: { type: string } }
    patch:
      tags: [program-studio]
      summary: 행 수정(정규화 값·CREATE/SKIP) → 재검증 — STAGED 배치만
      responses: { '200': { description: 재검증 결과 }, '422': { description: 커밋된 배치 } }
  /academies/{academyId}/imports/{batchId}/commit:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: batchId, in: path, required: true, schema: { type: string } }
    post:
      tags: [program-studio]
      summary: 커밋(tx) — VALID+CREATE 행만 활동 생성(부분 성공 정책)·같은 파일 재커밋 409
      responses:
        '200': { description: created/skipped/invalid }
        '409': { description: 이미 커밋됨·같은 fileHash 커밋 존재 }
  /academies/{academyId}/imports/{batchId}/revert:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: batchId, in: path, required: true, schema: { type: string } }
    post:
      tags: [program-studio]
      summary: 되돌리기 — batch 가 만든 활동을 보관(archive) 처리(삭제 아님·멱등)
      responses: { '200': { description: archived 수 }, '422': { description: 커밋 전 배치 } }

  # ── 프로그램 실행 PS4 (docs/20 §2 · 지시서 §6.6~6.8) — 반 적용·오늘 계획·
  #    결과 확정(참석 기본 반영+예외 수정)·경험 이벤트(append-only·UNIQUE 중복 차단).
  /academies/{academyId}/classes/{classId}/program-assignments:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: classId, in: path, required: true, schema: { type: string } }
    post:
      tags: [program-execution]
      summary: 반에 프로그램 적용 — PUBLISHED 버전만·같은 버전 ACTIVE 중복 금지·outbox CLASS_PROGRAM_ASSIGNED
      responses:
        '201': { description: assignmentId }
        '422': { description: 게시 안 된 버전·중복 적용·반 없음 }
  /academies/{academyId}/program-assignments/{assignmentId}/end:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: assignmentId, in: path, required: true, schema: { type: string } }
    post:
      tags: [program-execution]
      summary: 적용 종료(멱등) — effectiveTo 기록
      responses: { '200': { description: 종료됨 } }
  /academies/{academyId}/sessions/{sessionId}/plan:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: sessionId, in: path, required: true, schema: { type: string } }
    get:
      tags: [program-execution]
      summary: 오늘 수업 계획 — 다음 회차 제안·활동 목록·결과 상태(담당 코치/스태프)
      responses: { '200': { description: 'plans[]' }, '403': { description: 비담당 코치 } }
    post:
      tags: [program-execution]
      summary: 계획 확정 — 회차 미지정 시 다음 회차 자동(UNIQUE 멱등)
      responses: { '201': { description: planId·curriculumSessionId } }
  /academies/{academyId}/session-plans/{planId}/results:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: planId, in: path, required: true, schema: { type: string } }
    post:
      tags: [program-execution]
      summary: 결과 확정 — 완료/부분/미진행/대체 + 참석 기본 반영(출결)·예외 원생 수정 → 경험 이벤트 생성(중복 0)
      responses:
        '200': { description: resultsSaved·participants·experienceEvents }
        '403': { description: 비담당 코치 }
        '422': { description: 개정판 없음·REPLACED 대체 누락 }
  /academies/{academyId}/participants/{participantId}/experience-map:
    parameters:
      - { $ref: '#/components/parameters/AcademyId' }
      - { name: participantId, in: path, required: true, schema: { type: string } }
    get:
      tags: [program-execution]
      summary: 경험지도 — 영역별 경험 횟수·서로 다른 활동 수·최근성(능력 점수 아님·순위 없음)
      responses: { '200': { description: 'domains[]' }, '404': { description: 원생 없음(교차 테넌트 포함) } }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: pf_session
      description: >
        [R4 §11] 속성: HttpOnly · Secure · SameSite=Lax · Path=/ ·
        Max-Age=세션정책(권한 상승·로그인 시 rotation). 상태 변경 요청은
        info.description 의 CSRF 계약(Origin 검증 + X-CSRF-Token)을 함께 만족해야 함.

  parameters:
    AcademyId:
      name: academyId
      in: path
      required: true
      schema: { type: string }
      description: 테넌트 격리 축. 세션 소속과 불일치 시 403 TENANT_SCOPE.
    ParticipantId:
      name: participantId
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string }
      description: >
        멱등 의미(idempotency.ts, 구현 기준): (academy, actor, operation, key, bodyHash) 기준.
        같은 key+body = 200 응답 재생 / 다른 body = 409 IDEMPOTENCY_KEY_REUSED /
        처리중 = 409 IN_PROGRESS / 보관기간(24h) 만료 후 = 신규.
        헤더 누락·128자 초과 = 422 IDEMPOTENCY_KEY_REQUIRED.
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema: { type: string }
      description: >
        상관관계 추적용(계약 초안). 없으면 서버 생성 — 오류 응답에 requestId 를
        되돌려주는 것은 추후 공통 오류 계약(P1)에서 Error 스키마와 함께 도입.
    PageSize:
      name: 'page[size]'
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    PageCursor:
      name: 'page[cursor]'
      in: query
      schema: { type: string }

  responses:
    Unauthorized: { description: 미인증/세션 만료, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Forbidden: { description: 권한/테넌트/담당/연결 스코프 위반, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    NotFound: { description: 없음(타 테넌트 리소스도 404 로 응답 — 존재 노출 금지), content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    IdempotencyConflict: { description: 같은 Idempotency-Key + 다른 body, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Unprocessable: { description: 검증 실패(금액 불일치·혼합결제 등), content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    RateLimited: { description: 요청 한도 초과(OTP 등), content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  schemas:
    Error:
      type: object
      description: >
        구현 기준 오류 형식 = { error: "CODE" } + 상황별 선택 필드(reason·paymentId·issues).
        code 예: UNAUTHORIZED · FORBIDDEN_ORIGIN · CSRF_TOKEN_MISMATCH ·
        FORBIDDEN_TENANT_SCOPE · MEMBERSHIP_NOT_ACTIVE · FORBIDDEN_ROLE ·
        PLATFORM_ADMIN_SEPARATE_BOUNDARY · NOT_FOUND · UNKNOWN_PROVIDER ·
        PROVIDER_NOT_CONFIGURED · CONFLICT · IN_PROGRESS · IDEMPOTENCY_KEY_REUSED ·
        ACTIVE_PAYMENT_ATTEMPT_EXISTS · IDEMPOTENCY_KEY_REQUIRED · INVALID_BODY ·
        UNPROCESSABLE · SIGNATURE_INVALID.
        requestId 필드는 추후 공통 오류 계약(P1)에서 추가 예정.
      required: [error]
      properties:
        error: { type: string, description: 오류 코드 — 위 description 의 목록 참조 }
        reason: { type: string, description: 사람이 읽는 거부 사유(422 UNPROCESSABLE 등) }
        paymentId: { type: string, description: ACTIVE_PAYMENT_ATTEMPT_EXISTS 시 진행 중 결제 ID }
        issues: { type: array, items: { type: string }, description: INVALID_BODY 시 zod 검증 실패 필드 경로 }

    Session:
      type: object
      description: GET /sessions/me 응답 — sessions/service.ts ResolvedSession 과 1:1.
      required: [user, memberships]
      properties:
        user:
          type: object
          required: [id, name, phone, email]
          properties:
            id: { type: string }
            name: { type: string }
            phone: { type: string }
            email: { type: ['string', 'null'] }
        memberships:
          type: array
          description: 서버 도출 — 클라 입력 아님. 멀티역할 모델 A(roles[]).
          items:
            type: object
            properties:
              academyId: { type: string }
              roles: { type: array, items: { type: string, x-domain-enum: ROLES, enum: [OWNER, MANAGER, COACH, DESK, DRIVER, GUARDIAN, PLATFORM_ADMIN] } }
              status: { type: string, x-domain-enum: MEMBERSHIP_STATUS, enum: [INVITED, ACTIVE, SUSPENDED, ENDED] }

    GuardianLinkRequest:
      type: object
      description: >
        apps/api LinkBody(zod strict)와 1:1 — 예상하지 않은 필드는 422. otpVerified boolean 없음.
        academyId 는 body 가 아니라 path 로 받는다. actorUserId 는 세션 도출.
      required: [verificationSessionId, childName, childBirth, relationshipType, consentPolicyVersion, consentAgreed]
      additionalProperties: false
      properties:
        verificationSessionId: { type: string, description: OTP 검증이 발급한 서버 증적(GuardianVerificationSession) }
        childName: { type: string }
        childBirth: { type: string, format: date }
        relationshipType: { type: string, x-domain-enum: RELATIONSHIP_TYPE, enum: [MOTHER, FATHER, GRANDPARENT, LEGAL_GUARDIAN, OTHER] }
        consentPolicyVersion: { type: string }
        consentAgreed: { type: boolean }
        academyInviteCode: { type: string, description: 선등록 연락처 불일치 시 대안 결합 근거 }
    LinkResult:
      type: object
      description: >
        구현 기준(linking/service.ts LinkSliceResult): VERIFIED(201) 은 linkId·participantId 포함,
        PENDING·REJECTED(202) 는 reason 포함. UNVERIFIED 는 응답으로 쓰이지 않음(도메인 enum 전체 대조용).
      required: [status]
      properties:
        status: { type: string, x-domain-enum: VERIFICATION_STATUS, enum: [UNVERIFIED, PENDING, VERIFIED, REJECTED, REVOKED] }
        linkId: { type: string }
        participantId: { type: string }
        reason: { type: string }

    AttendanceNoticeInput:
      type: object
      required: [participantId, classSessionId, type]
      properties:
        participantId: { type: string }
        classSessionId: { type: string }
        type: { type: string, x-domain-enum: ATTENDANCE_NOTICE_TYPE, enum: [ABSENCE, LATE, EARLY_LEAVE] }
        reason: { type: string }
    AttendanceNotice:
      allOf:
        - $ref: '#/components/schemas/AttendanceNoticeInput'
        - type: object
          required: [id, academyId, createdByGuardianId, createdAt]
          properties:
            id: { type: string }
            academyId: { type: string }
            createdByGuardianId: { type: string }
            createdAt: { type: string, format: date-time }
    AttendanceRecordInput:
      type: object
      required: [participantId, classSessionId, status]
      properties:
        participantId: { type: string }
        classSessionId: { type: string }
        status: { type: string, x-domain-enum: ATTENDANCE_RECORD_STATUS, enum: [PRESENT, ABSENT, LATE, EARLY_LEAVE, EXCUSED] }
    AttendanceRecord:
      allOf:
        - $ref: '#/components/schemas/AttendanceRecordInput'
        - type: object
          required: [id, academyId, confirmedByUserId, confirmedAt]
          properties:
            id: { type: string }
            academyId: { type: string }
            confirmedByUserId: { type: string }
            confirmedAt: { type: string, format: date-time }

    GuardianInvoice:
      type: object
      description: >
        GET /academies/{academyId}/invoices 응답 요소 — billing/queries.ts GuardianInvoiceRow 와 1:1.
        netPaidAmount·outstandingAmount 도출은 서버 내부(billing.ts) — 목록 응답에는 미포함(추후 확장).
      required: [invoiceId, participantId, participantName, status, total, dueDate, lines]
      properties:
        invoiceId: { type: string }
        participantId: { type: string }
        participantName: { type: string }
        status: { type: string, x-domain-enum: INVOICE_STATUS, enum: [DRAFT, ISSUED, PARTIALLY_PAID, PAID, OVERDUE, VOID, REFUNDED] }
        total: { type: integer, description: KRW. = Σ lines }
        dueDate: { type: string, format: date }
        lines:
          type: array
          items:
            type: object
            required: [type, label, amount]
            properties:
              type: { type: string, description: TUITION·TRANSPORT 등 InvoiceLine 유형 }
              label: { type: string }
              amount: { type: integer }

    PaymentInput:
      type: object
      description: >
        apps/api PrepareBody(zod strict)와 1:1 — 예상하지 않은 필드는 422 INVALID_BODY.
        금액은 서버가 invoiceIds 로 전액 재계산 — 클라 금액 필드는 받지 않는다.
      required: [invoiceIds]
      additionalProperties: false
      properties:
        invoiceIds:
          type: array
          minItems: 1
          maxItems: 10
          items: { type: string }
          description: 같은 학원 소속 + 결제 가능(canPay) 자녀분만. 위반 시 422 UNPROCESSABLE(+reason).
    PaymentPrepareResult:
      type: object
      description: POST payments/prepare 201(생성)·200(멱등 재생) 공통 응답.
      required: [paymentId, amount, status]
      properties:
        paymentId: { type: string }
        amount: { type: integer, description: 서버 재계산 합산 금액(KRW) }
        status: { type: string, description: 'Payment 상태 — 생성 직후는 PENDING, 재생은 저장된 현재 상태(PAYMENT_STATUS enum)' }
    PaymentAllocation:
      type: object
      required: [id, invoiceId, amount]
      properties:
        id: { type: string }
        invoiceId: { type: string }
        participantId: { type: string }
        amount: { type: integer }
    Payment:
      type: object
      required: [id, academyId, amount, status, allocations]
      properties:
        id: { type: string }
        academyId: { type: string }
        guardianId: { type: string }
        amount: { type: integer, description: 서버 계산. = Σ allocations }
        status: { type: string, x-domain-enum: PAYMENT_STATUS, enum: [PENDING, AUTHORIZED, CAPTURED, FAILED, CANCELLED, PARTIALLY_REFUNDED, REFUNDED] }
        allocations: { type: array, items: { $ref: '#/components/schemas/PaymentAllocation' } }
        providerStatus: { type: string, description: PG 원문 상태(참고용 — 정본은 status) }
        providerPaymentId: { type: string }
        createdAt: { type: string, format: date-time }

    RefundRequest:
      type: object
      description: >
        환불 귀속 = PaymentAllocation 기준(합산결제 후 특정 원생만 환불).
        [R4 §5] Refund 1건 = 원생 1명: 모든 allocation 이 participantId 의
        청구서를 가리켜야 하며, 여러 원생을 섞은 요청은 422
        (REFUND_PARTICIPANT_CHAIN_MISMATCH). 형제는 원생별로 분리 요청.
        [R4 §3] 부분승인 미지원: 승인은 요청 전액 승인 또는 전액 거절.
        일부 승인이 필요하면 거절 후 수정 금액으로 재요청.
        요청자는 실제 결제자(Payment.guardianId = actor)여야 한다(R4 §4).
      required: [paymentId, participantId, allocations, reasonCode]
      properties:
        paymentId: { type: string }
        participantId: { type: string, description: 이 환불이 귀속되는 원생 1명 — 전 allocation 과 일치 }
        allocations:
          type: array
          minItems: 1
          items:
            type: object
            required: [paymentAllocationId, amount]
            properties:
              paymentAllocationId: { type: string }
              amount: { type: integer, description: 누적 환불이 해당 allocation 결제액 초과 불가 }
        reasonCode: { type: string }
        reasonText: { type: string }
    Refund:
      type: object
      required: [id, paymentId, status, requestedAmount]
      properties:
        id: { type: string }
        academyId: { type: string }
        paymentId: { type: string }
        participantId: { type: string }
        status: { type: string, x-domain-enum: REFUND_STATUS, enum: [REQUESTED, MUTUALLY_APPROVED, PROCESSING, COMPLETED, FAILED, UNKNOWN, REJECTED] }
        requestedAmount: { type: integer }
        approvedAmount: { type: integer }
        completedAmount: { type: integer }
        guardianApprovedAt: { type: string, format: date-time }
        academyApprovedAt: { type: string, format: date-time }
        providerRefundId: { type: string }

    PgWebhookEvent:
      type: object
      description: >
        ⚠️ mockpg(개발 시뮬) 전용 body — apps/api WebhookBody(zod strict)와 1:1.
        paymentId·targetStatus 를 직접 지정하는 형식은 dev 에서만 유효.
        실 provider 연동 시 adapter 가 서명 검증 후 provider event
        (providerPaymentId·event type)를 내부 결제·상태로 매핑한다(R7 P0-4 — 미구현).
      required: [providerEventId, paymentId, targetStatus, occurredAt]
      additionalProperties: false
      properties:
        providerEventId: { type: string, description: '(provider, providerEventId) unique — inbox 중복 방지 축' }
        paymentId: { type: string, description: 내부 Payment ID (mockpg 전용 — 실 provider 는 providerPaymentId 매핑) }
        targetStatus: { type: string, x-domain-enum: PAYMENT_STATUS, enum: [PENDING, AUTHORIZED, CAPTURED, FAILED, CANCELLED, PARTIALLY_REFUNDED, REFUNDED] }
        occurredAt: { type: string, format: date-time, description: PG 발생시각 — monotonic guard 기준 }

    ConsentGrant:
      type: object
      required: [purpose, audience]
      properties:
        purpose: { type: string, x-domain-enum: CONSENT_PURPOSE, enum: [INDIVIDUAL_DELIVERY, CLASS_SHARE, INTERNAL_RECORD, ACADEMY_PROMOTION, EXTERNAL_AD, SNS_POST] }
        audience: { type: string, x-domain-enum: CONSENT_AUDIENCE, enum: [GUARDIAN_ONLY, CLASS_MEMBERS, ACADEMY_INTERNAL, PUBLIC] }
    PhotoConsentInput:
      type: object
      required: [policyId, policyVersion, grants]
      properties:
        policyId: { type: string }
        policyVersion: { type: string }
        grants: { type: array, items: { $ref: '#/components/schemas/ConsentGrant' }, description: 허용 조합만 — 목적/대상 독립 배열 금지(교차조합 차단) }
        expiresAt: { type: string, format: date-time }
    PhotoConsentRecord:
      allOf:
        - $ref: '#/components/schemas/PhotoConsentInput'
        - type: object
          required: [id, guardianId, participantId, consentedAt]
          properties:
            id: { type: string }
            academyId: { type: string }
            guardianId: { type: string }
            participantId: { type: string }
            consentedAt: { type: string, format: date-time }
            channel: { type: string }
            revokedAt: { type: string, format: date-time }
            etag: { type: string, description: PUT If-Match 용 버전 }
